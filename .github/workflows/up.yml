name: Sync upstream (force fresh copy)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Prepare fresh branch from upstream
        run: |
          BRANCH="sync/upstream"

          # Delete local branch if it exists
          git branch -D $BRANCH || true

          # Delete remote branch if it exists (to start fresh)
          git push origin --delete $BRANCH || true

          # Create new branch from main
          git checkout -b $BRANCH main

          # Remove all files (we want a clean slate)
          git rm -rf .

          # Copy ALL upstream files (except .git)
          git checkout upstream/main -- .

          # Restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Restore YOUR README.md from main
          git checkout main -- README.md
          git add README.md

          # Commit (there will always be changes unless upstream is identical to main)
          git commit -m "Fresh sync from upstream (kept podcast & README from main)"

          # Push the branch
          git push -u origin $BRANCH --force

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          force: true
          delete-branch: false
          commit-message: "Fresh sync from upstream (kept podcast & README)"
          title: "Sync upstream (fresh copy, keep podcast & README)"
          body: |
            This PR provides a fresh copy of upstream, with your podcast folder and README preserved.

            - All files (except podcast and README) are taken **exactly** from upstream.
            - Your `src/content/podcast` folder is kept from `main`.
            - Your `README.md` is kept from `main`.

            Review the diff and merge to apply the latest upstream changes.
