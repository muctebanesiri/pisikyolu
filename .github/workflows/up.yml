name: Sync upstream (keep my podcast, take upstream for rest)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and merge upstream (prefer upstream on conflicts)
        run: |
          BRANCH="sync/upstream"

          # Delete the remote branch if it exists (to start fresh)
          git push origin --delete $BRANCH || true

          # Start from your main
          git checkout main
          git checkout -b $BRANCH

          # Merge upstream, auto-resolve conflicts in favour of upstream
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # Remove upstream's podcast folder (if present)
          git rm -rf src/content/podcast || true

          # Now restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Keep README.md from main (overwrite any upstream changes)
          git checkout main -- README.md
          git add README.md

          # Commit (if there were changes, otherwise dummy commit)
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main (auto-resolved; podcast and README kept from main)"
          else
            git commit --allow-empty -m "Dummy commit – no changes from upstream"
          fi

          # Push the branch (force‑update)
          git push -u origin $BRANCH --force

      - name: Create or Update Pull Request
        run: |
          BRANCH="sync/upstream"
          # Check if PR already exists for this branch
          PR_URL=$(gh pr list --base main --head $BRANCH --json url --jq '.[0].url' || echo "")
          if [ -z "$PR_URL" ]; then
            # No existing PR, create one
            gh pr create --base main --head $BRANCH \
              --title "Sync upstream (keep my podcast & README)" \
              --body "This PR merges upstream changes while:\n- Auto‑resolving conflicts by taking upstream version (except podcast & README)\n- Keeping your **own** `src/content/podcast` folder (from main)\n- Keeping your `README.md` (from main)\n\nReview and merge."
          else
            echo "Pull request already exists: $PR_URL"
            echo "The branch has been force-pushed, so the PR is updated automatically."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
