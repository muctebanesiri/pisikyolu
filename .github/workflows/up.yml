name: Sync selected upstream directories

on:
  schedule:
    - cron: '0 0 * * *'        # daily at midnight UTC
  workflow_dispatch:           # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and copy selected directories
        run: |
          # Delete any existing remote branch (fresh start)
          git push origin --delete sync/upstream || true

          # Start from your main branch
          git checkout main
          git checkout -b sync/upstream

          # Remove all current files (we want a clean copy of what we select)
          git rm -rf .

          # Copy the directories you want from upstream
          # 1. Copy the entire 'scripts' directory
          git checkout upstream/main -- scripts

          # 2. Copy the entire 'src' directory (we'll remove the podcast folder next)
          git checkout upstream/main -- src

          # Remove the podcast folder from src/content
          git rm -rf src/content/podcast

          # Remove README.md if it exists
          git rm -f README.md 2>/dev/null || true

          # Stage everything and commit
          git add -A
          git commit -m "Sync scripts/ and src/ (excluding src/content/podcast and README.md) from upstream"

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync scripts and src from upstream" \
            --body "This PR syncs:\n- The entire `scripts/` directory\n- The entire `src/` directory (excluding `src/content/podcast/`)\n- README.md is also excluded\n\nReview the changes and merge what you want." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
