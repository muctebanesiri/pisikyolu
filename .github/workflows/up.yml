name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet upstream/main -- .; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch from main and merge upstream
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git checkout main
          git checkout -b sync/upstream
          # Merge upstream/main into the new branch
          git merge upstream/main --no-edit --allow-unrelated-histories
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          title: "Sync all upstream changes"
          body: |
            This PR brings all new files and updates from the original repository.
            Review each file before merging.
          delete-branch: true
