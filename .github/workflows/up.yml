name: Merge specific file/directory from upstream

on:
  workflow_dispatch:
    inputs:
      path:
        description: 'Relative path (e.g., src/scripts) or full GitHub URL (e.g., https://github.com/hzoo/hopeinsource.com/tree/main/src/scripts)'
        required: true
        type: string

jobs:
  merge-specific:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Sanitize input path
        id: sanitize
        run: |
          RAW_PATH="${{ github.event.inputs.path }}"
          # If it's a GitHub URL, extract the path after /tree/main/
          if [[ "$RAW_PATH" =~ github\.com.*/tree/main/(.*) ]]; then
            CLEAN_PATH="${BASH_REMATCH[1]}"
          else
            CLEAN_PATH="$RAW_PATH"
          fi
          echo "clean_path=$CLEAN_PATH" >> $GITHUB_OUTPUT
          echo "Extracted path: $CLEAN_PATH"

      - name: Check if path exists upstream
        run: |
          if ! git ls-tree upstream/main -- "${{ steps.sanitize.outputs.clean_path }}" | grep -q .; then
            echo "::error::Path '${{ steps.sanitize.outputs.clean_path }}' does not exist in upstream/main"
            exit 1
          fi

      - name: Create branch and copy the specified path
        run: |
          # Delete existing remote branch (ignore if not exists)
          git push origin --delete sync/specific || true

          # Start from main
          git checkout main
          git checkout -b sync/specific

          # Copy only the sanitized path from upstream
          git checkout upstream/main -- ${{ steps.sanitize.outputs.clean_path }}

          # Stage and commit
          git add -A
          git commit -m "Merge ${{ steps.sanitize.outputs.clean_path }} from upstream"

          # Push branch
          git push -u origin sync/specific --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/specific \
            --title "Merge ${{ steps.sanitize.outputs.clean_path }} from upstream" \
            --body "This PR merges only the path: \`${{ steps.sanitize.outputs.clean_path }}\` from upstream.\n\nReview and merge it." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
