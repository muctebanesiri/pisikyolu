name: Sync upstream (always create PR)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Prepare fresh branch with upstream content
        run: |
          BRANCH="sync/upstream"

          # Delete local branch if it exists
          git branch -D $BRANCH || true

          # Delete remote branch if it exists
          git push origin --delete $BRANCH || true

          # Create branch from main
          git checkout -b $BRANCH main

          # Remove all current files
          git rm -rf .

          # Copy everything from upstream (except .git)
          git checkout upstream/main -- .

          # Restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Restore YOUR README.md from main
          git checkout main -- README.md
          git add README.md

          # Add a timestamp file to force a diff (this will always be new)
          echo "Last sync: $(date -u)" > .sync-timestamp
          git add .sync-timestamp

          # Commit everything
          git commit -m "Fresh sync from upstream (kept podcast & README, timestamped)"

          # Push the branch
          git push -u origin $BRANCH --force

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          force: true
          delete-branch: false
          commit-message: "Fresh sync from upstream (kept podcast & README, timestamped)"
          title: "Sync upstream (fresh copy, keep podcast & README)"
          body: |
            This PR provides a fresh copy of upstream, with your podcast folder and README preserved.

            - All files (except podcast and README) are taken **exactly** from upstream.
            - Your `src/content/podcast` folder is kept from `main`.
            - Your `README.md` is kept from `main`.

            **Note:** The `.sync-timestamp` file is just a marker to force this PR. You can ignore it; it has no effect on your site.

            Review the diff and merge to apply the latest upstream changes.

      - name: Log result
        run: |
          if [[ "${{ steps.pr.outputs.pull-request-number }}" != "" ]]; then
            echo "✅ Pull request #${{ steps.pr.outputs.pull-request-number }} created/updated."
          else
            echo "ℹ️ No changes detected – this should not happen."
          fi
