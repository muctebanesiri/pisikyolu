name: Sync upstream (keep my podcast, take upstream for rest)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch with upstream merge
        run: |
          BRANCH="sync/upstream"

          # Delete the remote branch if it exists (to start fresh)
          git push origin --delete $BRANCH || true

          # Start from main
          git checkout main
          git checkout -b $BRANCH

          # Merge upstream, auto-resolve conflicts in favour of upstream
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # Remove upstream's podcast folder (if present)
          git rm -rf src/content/podcast || true

          # Restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Keep README.md from main
          git checkout main -- README.md
          git add README.md

          # If there are no staged changes, add a timestamp file so the branch is ahead
          if git diff --cached --quiet; then
            echo "No upstream changes detected – adding timestamp file to force a diff."
            echo "Last sync: $(date -u)" > .sync-timestamp
            git add .sync-timestamp
          fi

          # Commit (staged changes are guaranteed now)
          git commit -m "Merge upstream/main (auto-resolved; podcast and README kept from main)"

          # Push the branch (force‑update)
          git push -u origin $BRANCH --force

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          title: "Sync upstream (keep my podcast & README)"
          body: |
            This PR merges upstream changes while:
            - Auto‑resolving conflicts by taking upstream version (except podcast & README)
            - Keeping your **own** `src/content/podcast` folder (from main)
            - Keeping your `README.md` (from main)

            Review and merge.
          delete-branch: false
          commit-message: "Merge upstream/main (auto-resolved; podcast and README kept from main)"
