name: Sync upstream (exclude README.md and podcast folder)

on:
  schedule:
    - cron: '0 0 * * *'          # daily at midnight UTC
  workflow_dispatch:             # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch from main with upstream content (excluding README and podcast)
        run: |
          # Delete any existing remote branch
          git push origin --delete sync/upstream || true

          # Start from your main branch
          git checkout main
          git checkout -b sync/upstream

          # Remove all current files (we want to start fresh)
          git rm -rf .

          # Copy EVERYTHING from upstream
          git checkout upstream/main -- .

          # Restore the files/folders you want to keep from your main
          git checkout main -- README.md
          git checkout main -- src/content/podcast

          # Stage and commit (this will show the diff between main and upstream,
          # minus the two restored items)
          git add -A
          git commit -m "Sync upstream (excluding README.md and src/content/podcast)"

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync upstream (exclude README and podcast)" \
            --body "This PR syncs all upstream files except:\n- README.md\n- src/content/podcast/\n\nReview and merge." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
