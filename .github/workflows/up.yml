name: Sync upstream (debug)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Prepare branch and list diffs
        run: |
          BRANCH="sync/upstream"
          git branch -D $BRANCH || true
          git checkout -b $BRANCH main
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true
          git rm -rf src/content/podcast || true
          git checkout main -- src/content/podcast
          git add src/content/podcast
          git checkout main -- README.md
          git add README.md
          git add -A
          echo "=== Files different from main (after exclusions) ==="
          git diff main --name-status || echo "No differences"
          echo "=== Files from upstream that are not brought in (should only be podcast/README) ==="
          git diff upstream/main --name-status || echo "No differences"

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          force: true
          delete-branch: false
          commit-message: "Sync upstream"
          title: "Sync upstream"
          body: "Sync upstream changes"

      - name: Log result
        run: |
          if [[ "${{ steps.pr.outputs.pull-request-number }}" != "" ]]; then
            echo "✅ Pull request #${{ steps.pr.outputs.pull-request-number }} created/updated."
          else
            echo "ℹ️ No changes detected – no pull request needed."
          fi
