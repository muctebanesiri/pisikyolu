name: Merge specific file/directory from upstream

on:
  workflow_dispatch:
    inputs:
      path:
        description: 'Path to file or directory (e.g., src/scripts/search.ts or scripts/)'
        required: true
        type: string

jobs:
  merge-specific:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and copy the specified path
        run: |
          # Delete any existing remote branch (start fresh)
          git push origin --delete sync/specific || true

          # Start from main
          git checkout main
          git checkout -b sync/specific

          # Copy only the requested path from upstream
          git checkout upstream/main -- ${{ github.event.inputs.path }}

          # Stage and commit
          git add -A
          git commit -m "Merge ${{ github.event.inputs.path }} from upstream"

          # Push branch
          git push -u origin sync/specific --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/specific \
            --title "Merge ${{ github.event.inputs.path }} from upstream" \
            --body "This PR merges only the path: \`${{ github.event.inputs.path }}\` from upstream.\n\nReview and merge it." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
