name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet upstream/main -- .; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch with upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Start from your main branch
          git checkout main
          # Create a new branch (will be your main + upstream merge)
          git checkout -b sync/upstream
          # Merge upstream into it, allow unrelated histories, but don't auto-commit
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true
          # If there are staged changes (including conflicts), commit them
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main into sync/upstream (including conflicts if any)"
            git push -u origin sync/upstream --force
          else
            echo "Merge produced no changes – nothing to commit."
            exit 1
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          title: "Sync all upstream changes"
          body: |
            This PR brings all new files and updates from the original repository.
            Review each file before merging.
            If there are conflicts, they are shown in the diff. Resolve them here or locally.
          delete-branch: true
