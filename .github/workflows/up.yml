name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'      # daily at midnight UTC
  workflow_dispatch:         # allows manual trigger

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}   # use your PAT

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/hzoo/hopeinsource.com.git
          git fetch upstream main

      - name: Create a branch with upstream content
        run: |
          # Create a new branch from upstream/main
          git checkout -b sync/upstream upstream/main
          # Push this branch to your repository
          git push -u origin sync/upstream

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream           # the branch we just pushed
          base: main                      # target branch in your repo
          title: "Sync all upstream changes"
          body: |
            This PR brings all new files and updates from the original repository.
            Review each file before merging.
          delete-branch: true             # delete the branch after merging
