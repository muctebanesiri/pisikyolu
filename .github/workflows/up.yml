name: Sync from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create merge branch from main and merge upstream
        run: |
          # Delete any old remote branch to start fresh
          git push origin --delete sync/upstream || true
          # Start from your main
          git checkout main
          git checkout -b sync/upstream
          # Merge upstream, allow unrelated histories, do not commit automatically
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true
          # Stage everything (including conflicts)
          git add -A
          # If there are staged changes, commit them; otherwise add a dummy commit
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main into sync/upstream"
          else
            git commit --allow-empty -m "Dummy commit to sync upstream"
          fi
          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request (or update existing)
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync all upstream changes" \
            --body "This PR brings all upstream changes. Resolve conflicts if any." \
            --force || echo "PR already exists or could not be created"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
