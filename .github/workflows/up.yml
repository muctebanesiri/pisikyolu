name: Sync upstream (keep podcast & README)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Prepare branch with upstream merge
        run: |
          BRANCH="sync/upstream"

          # Delete local branch if it exists
          git branch -D $BRANCH || true

          # Create new branch from main
          git checkout -b $BRANCH main

          # Merge upstream, auto-resolve conflicts in favour of upstream (no commit yet)
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # Remove any upstream podcast folder
          git rm -rf src/content/podcast || true

          # Restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Keep YOUR README.md from main
          git checkout main -- README.md
          git add README.md

          # Stage any other changes (just in case)
          git add -A

          # Debug: show what is staged
          echo "=== Staged changes (if any) ==="
          git diff --cached --name-status || echo "No staged changes"

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          force: true
          delete-branch: false
          commit-message: "Sync upstream (auto-resolved, kept podcast & README)"
          title: "Sync upstream (keep my podcast & README)"
          body: |
            This PR merges the latest upstream changes into your `main` branch.

            - All conflicts are **auto‑resolved** by taking the upstream version.
            - Your **`src/content/podcast`** folder is **kept exactly as in `main`**.
            - Your **`README.md`** is **kept exactly as in `main`**.

            Review the diff and merge if everything looks good.

      - name: Log result
        run: |
          if [[ "${{ steps.pr.outputs.pull-request-number }}" != "" ]]; then
            echo "✅ Pull request #${{ steps.pr.outputs.pull-request-number }} created/updated."
          else
            echo "ℹ️ No changes detected – no pull request needed."
          fi
