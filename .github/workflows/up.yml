name: Sync upstream (always take upstream, except README and podcast)

on:
  schedule:
    - cron: '0 0 * * *'          # daily at midnight UTC
  workflow_dispatch:             # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch from main and merge upstream (prefer upstream on conflicts)
        run: |
          # Delete any existing remote branch
          git push origin --delete sync/upstream || true

          # Start from your main branch
          git checkout main
          git checkout -b sync/upstream

          # Merge upstream/main, using -X theirs to auto-resolve conflicts in favour of upstream
          # --allow-unrelated-histories is only needed the first time.
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # If there are conflicts, they are already resolved by -X theirs.
          # But we must ensure that README.md and src/content/podcast are from main.
          # Restore these two paths to their main versions (overwriting any upstream changes).
          git checkout main -- README.md
          git checkout main -- src/content/podcast
          git add README.md src/content/podcast

          # Now commit the merge (if there were no changes at all, we add a dummy commit)
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main (conflicts auto-resolved; README/podcast kept from main)"
          else
            git commit --allow-empty -m "Dummy commit – no changes from upstream"
          fi

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync upstream (auto‑take upstream, keep README & podcast)" \
            --body "This PR merges the latest upstream changes into your main.\n\n- All conflicts are automatically resolved by **taking the upstream version**.\n- **README.md** and **src/content/podcast/** are kept exactly as they are on your **main** branch.\n- Review the diff and merge when ready." \
            --force || echo "PR already exists or could not be created"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
