name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet upstream/main -- .; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch with upstream changes (including conflicts)
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git checkout main
          git checkout -b sync/upstream
          # Merge upstream, allowing unrelated histories, do not auto-commit
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true
          # Stage all files (including conflict markers)
          git add .
          # Commit the merge (even if there are unresolved conflicts)
          git commit -m "Merge upstream/main into sync/upstream (with conflicts if any)"
          # Push the branch to your repository
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          title: "Sync all upstream changes"
          body: |
            This PR brings all new files and updates from the original repository.
            Review each file and resolve conflicts if any.
          delete-branch: true
