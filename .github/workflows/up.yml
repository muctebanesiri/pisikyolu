name: Sync selected upstream directories

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and copy selected directories
        run: |
          # Delete any existing remote branch (fresh start)
          git push origin --delete sync/upstream || true

          # Start from your main branch
          git checkout main
          git checkout -b sync/upstream

          # Copy the directories you want from upstream (overwriting local versions)
          git checkout upstream/main -- scripts
          git checkout upstream/main -- src

          # Restore the files/folders you want to keep from your main
          git checkout main -- src/content/podcast
          git checkout main -- README.md

          # Add and commit
          git add -A
          git commit -m "Sync scripts/ and src/ from upstream (preserving podcast folder and README from main)"

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync scripts and src from upstream" \
            --body "This PR updates:\n- `scripts/` directory\n- `src/` directory (excluding `src/content/podcast/`)\n\nIt preserves your current `README.md` and `src/content/podcast/` as they are in `main`." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
