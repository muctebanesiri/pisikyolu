name: Sync upstream (always create PR)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch with upstream content (clean copy, keep podcast & README, add timestamp)
        run: |
          BRANCH="sync/upstream"
          # Delete remote branch if exists
          git push origin --delete $BRANCH || true
          # Start from main
          git checkout main
          git checkout -b $BRANCH
          # Remove all tracked files
          git rm -rf .
          # Copy upstream content
          git checkout upstream/main -- .
          # Restore podcast and README from main
          git checkout main -- src/content/podcast
          git checkout main -- README.md
          # Add timestamp to force diff
          echo "Last sync: $(date -u)" > .sync-timestamp
          git add .sync-timestamp
          # Commit
          git commit -m "Sync upstream (keep podcast & README, timestamped)"
          # Push
          git push -u origin $BRANCH --force

      - name: Create or update Pull Request
        run: |
          BRANCH="sync/upstream"
          # Try to create PR; if it exists, it will error but the branch is updated
          gh pr create --base main --head $BRANCH \
            --title "Sync upstream (keep podcast & README)" \
            --body "This PR syncs upstream changes (excluding podcast and README). Timestamp file ensures a diff." \
            || echo "PR already exists – branch updated."
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
