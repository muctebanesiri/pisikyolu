name: Sync upstream (clean copy)

on:
  schedule:
    - cron: '0 0 * * *'        # daily at midnight UTC
  workflow_dispatch:           # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch from main with clean upstream content
        run: |
          # Delete any existing remote branch (fresh start)
          git push origin --delete sync/upstream || true

          # Start from your main branch
          git checkout main
          git checkout -b sync/upstream

          # Remove all current files (we want a clean copy of upstream)
          git rm -rf .

          # Copy all upstream files into the working directory
          git checkout upstream/main -- .

          # Stage and commit the new state (this is a single commit on top of main)
          git add -A
          git commit -m "Clean copy of upstream/main"

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync upstream (clean copy)" \
            --body "This PR applies the current upstream content as a single commit on top of main. Review each file and revert any you don't want by editing the PR files directly." \
            --force || echo "PR may already exist"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
