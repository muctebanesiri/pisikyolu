name: Sync upstream (delete podcast, keep README)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and merge upstream (prefer upstream on conflicts)
        run: |
          # Delete existing remote branch (if any)
          git push origin --delete sync/upstream || true

          # Start from your main
          git checkout main
          git checkout -b sync/upstream

          # Merge upstream, auto-resolve conflicts in favour of upstream
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # Now, remove the podcast folder entirely (both from working tree and staging)
          git rm -rf src/content/podcast || true

          # Keep README.md from main (overwrite any upstream changes)
          git checkout main -- README.md
          git add README.md

          # Commit the merge (if there were changes, otherwise dummy commit)
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main (auto-resolved conflicts; podcast removed, README kept from main)"
          else
            git commit --allow-empty -m "Dummy commit – no changes from upstream"
          fi

          # Push the branch
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync upstream (podcast removed, README preserved)" \
            --body "This PR merges upstream changes while:\n- Auto‑resolving conflicts by taking upstream version\n- **Deleting** the entire `src/content/podcast` folder\n- Keeping `README.md` as it is in `main`\n\nReview and merge." \
            --force || echo "PR already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
