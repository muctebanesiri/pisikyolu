name: Sync upstream (clean copy, no podcast, no README)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch from upstream (clean copy, remove podcast & README)
        run: |
          BRANCH="sync/upstream"

          # Delete remote branch if it exists (to start fresh)
          git push origin --delete $BRANCH || true

          # Delete local branch if it exists
          git branch -D $BRANCH || true

          # Create a new branch from upstream/main
          git checkout -b $BRANCH upstream/main

          # Remove unwanted items
          git rm -rf README.md || true
          git rm -rf src/content/podcast || true

          # Add a timestamp file to force a diff (so the branch is always ahead of main)
          echo "Last sync: $(date -u)" > .sync-timestamp
          git add .sync-timestamp

          # Commit the changes
          git commit -m "Clean copy of upstream (removed README and podcast)"

          # Push the branch
          git push -u origin $BRANCH --force

      - name: Create or Update Pull Request
        run: |
          BRANCH="sync/upstream"
          gh pr create --base main --head $BRANCH \
            --title "Sync upstream (clean copy, no podcast, no README)" \
            --body "This PR provides a clean copy of upstream with README and podcast folder removed.\n\nTimestamp file ensures a diff. Review and merge." \
            || echo "PR already exists – branch updated."
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
