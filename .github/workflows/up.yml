name: Sync upstream (always create PR)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch and merge upstream (prefer upstream on conflicts)
        id: create_branch
        run: |
          # Create a unique branch name with timestamp
          BRANCH_NAME="sync/upstream-$(date +%s)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Start from your main
          git checkout main
          git checkout -b $BRANCH_NAME

          # Merge upstream, auto-resolve conflicts in favour of upstream
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit --no-ff || true

          # Remove upstream's podcast folder (if present)
          git rm -rf src/content/podcast || true

          # Restore YOUR podcast folder from main
          git checkout main -- src/content/podcast
          git add src/content/podcast

          # Keep README.md from main
          git checkout main -- README.md
          git add README.md

          # Commit (or dummy commit if no changes)
          if ! git diff --cached --quiet; then
            git commit -m "Merge upstream/main (auto-resolved; podcast and README kept from main)"
          else
            git commit --allow-empty -m "Dummy commit – no changes from upstream"
          fi

          # Push the branch
          git push -u origin $BRANCH_NAME --force

      - name: Create Pull Request
        run: |
          BRANCH="${{ steps.create_branch.outputs.branch_name }}"
          gh pr create --base main --head "$BRANCH" \
            --title "Sync upstream (keep my podcast & README) – $BRANCH" \
            --body "This PR merges upstream changes while:\n- Auto‑resolving conflicts by taking upstream version (except podcast & README)\n- Keeping your **own** `src/content/podcast` folder (from main)\n- Keeping your `README.md` (from main)\n\nReview and merge." \
            --force
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
