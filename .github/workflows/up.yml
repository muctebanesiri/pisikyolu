name: Sync from upstream (clean copy)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Create branch from upstream (clean copy)
        run: |
          # Delete any existing remote branch
          git push origin --delete sync/upstream || true
          # Create a new branch from upstream/main
          git checkout -b sync/upstream upstream/main
          # Push it
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync upstream (clean copy)" \
            --body "This branch is a clean copy of upstream. Review each file and revert any you don't want." \
            --force || echo "PR already exists or could not be created"
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
