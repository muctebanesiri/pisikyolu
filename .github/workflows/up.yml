name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Prepare branch for sync
        run: |
          # Delete remote branch if exists (to start fresh)
          git push origin --delete sync/upstream || true
          # Create a new branch from main
          git checkout main
          git checkout -b sync/upstream

      - name: Merge upstream into branch (allow conflicts)
        run: |
          # Merge upstream/main with unrelated histories, don't commit yet
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true

      - name: Stage all changes (including conflicts)
        run: git add -A

      - name: Check if there are staged changes
        id: check_staged
        run: |
          if git diff --cached --quiet; then
            echo "No staged changes"
            echo "has_staged=false" >> $GITHUB_OUTPUT
          else
            echo "Staged changes found"
            echo "has_staged=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit merge (or dummy commit if no changes)
        run: |
          if [[ "${{ steps.check_staged.outputs.has_staged }}" == "true" ]]; then
            git commit -m "Merge upstream/main with conflicts (if any)"
          else
            # No changes – add a dummy commit to force a PR
            echo "No content changes, adding dummy commit to trigger PR"
            git commit --allow-empty -m "Dummy commit to sync with upstream (no content changes)"
          fi
          git push -u origin sync/upstream --force

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          branch: sync/upstream
          base: main
          title: "Sync all upstream changes"
          body: |
            This PR syncs your repository with the latest changes from the upstream repository.
            - If there are merge conflicts, they are included in the commit – please resolve them.
            - If there were no content changes, a dummy commit was added to trigger this PR (you can ignore it or drop it).
          delete-branch: true
