name: Create PR from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MERGE_TOKEN }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hzoo/hopeinsource.com.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet upstream/main -- .; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch from main and merge upstream (allow conflicts)
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Delete the remote branch if it exists (to start fresh)
          git push origin --delete sync/upstream || true
          git checkout main
          git checkout -b sync/upstream
          # Attempt merge, allow unrelated histories, but don't auto-commit
          git merge upstream/main --allow-unrelated-histories --no-commit --no-ff || true
          # If there are conflicts, we commit them (with conflict markers) anyway
          if git diff --cached --quiet; then
            # No changes staged? That means merge was a no-op
            echo "Merge produced no changes – aborting"
            exit 1
          else
            # Commit the merge (conflicts included)
            git commit -m "Merge upstream/main with conflicts (if any)" || true
            # Push the branch
            git push -u origin sync/upstream --force
          fi

      - name: Create Pull Request using GitHub CLI
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          gh pr create --base main --head sync/upstream \
            --title "Sync all upstream changes" \
            --body "This PR brings all changes from upstream. Please review each file and resolve conflicts if any are shown."
        env:
          GITHUB_TOKEN: ${{ secrets.MERGE_TOKEN }}
